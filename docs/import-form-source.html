.row .checkbox {

}
.row label input[type="checkbox"] {

}

.required-star {

fieldset {

legend {

<script>
// === Dynamic dropdown: building type based on occupancy ===
function updateBuildingTypeDropdown() {
    const occupancySelect = document.getElementById('pri_building_occupancy');
    const buildingTypeSelect = document.getElementById('pri_building_type');
    const selectedOccupancy = occupancySelect.value;
    buildingTypeSelect.innerHTML = '';

    const isNonResidential = selectedOccupancy.includes('Non-Residential') ||
                            selectedOccupancy.includes('Non-Resident');
    let options;
    if (isNonResidential) {
        options = ['Agricultural building', 'Commercial building', 'Government-owned building',
                  'House of worship building', 'Recreation building', 'Detached garage', 'Storage/tool shed',
                  'Other non-residential building type (explain in comments)'];
    } else {
        options = ['Main Dwelling', 'Detached guest house', 'Apartment unit', 'Entire apartment building',
                  'Cooperative unit', 'Entire cooperative building',
                  'residential condominium unit (in a residential building)',
                  'residential condominium unit (in a non-residential building)',
                  'Entire residential condominium building',
                  'Other dwelling type (explain in comments)'];
    }
    options.forEach(option => {
        buildingTypeSelect.add(new Option(option, option));
    });
}

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('pri_building_occupancy').addEventListener('change', updateBuildingTypeDropdown);
    setTimeout(updateBuildingTypeDropdown, 100);
});

// === DOCX to JSON Converter ===
async function upload() {
    const fileInput = document.getElementById('file');
    const file = fileInput.files[0];
    if (!file) { alert('Please select a file'); return; }
    if (!file.name.toLowerCase().endsWith('.docx')) { alert('Please upload a DOCX file'); return; }

    try {
        const jsonData = await extractJSONFromDocx(file);
        const convertedData = convertToOSAFormat(jsonData);
        document.getElementById('jsonOutput').value = JSON.stringify(convertedData, null, 4);
    } catch (error) {
        console.error('Error processing file:', error);
        alert('Error processing file: ' + error.message);
    }
}

async function extractJSONFromDocx(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
                const jsonContent = extractJSONFromText(result.value);
                if (jsonContent) { resolve(jsonContent); }
                else { reject(new Error('No valid JSON found in document')); }
            } catch (error) { reject(error); }
        };
        reader.readAsArrayBuffer(file);
    });
}

function extractJSONFromText(text) {
    let cleanedText = text
        .replace(/[\u201C\u201D]/g, '"')
        .replace(/[\u2018\u2019]/g, "'")
        .replace(/\r\n/g, '\n')
        .replace(/\t/g, ' ');

    const jsonMatch = cleanedText.match(/{[\s\S]*}/);
    if (jsonMatch) {
        try { return JSON.parse(jsonMatch[0]); }
        catch (e) {
            try { return JSON.parse(fixJsonString(jsonMatch[0])); }
            catch (e2) { console.warn('Failed to parse JSON:', e2); }
        }
    }
    return null;
}

function fixJsonString(jsonStr) {
    return jsonStr
        .replace(/([{,]\s*)(\w+)(:)/g, '$1"$2"$3')
        .replace(/:\s*'([^']*)'/g, ': "$1"')
        .replace(/,\s*}/g, '}')
        .replace(/,\s*]/g, ']');
}

function convertToOSAFormat(sourceJSON) {
    // Full converter — maps external JSON (from DOCX) to OSA's internal format
    // See source for complete field mapping
    const targetJSON = {
        backOffice: {
            adjusterName: '', adjusterFcnNumber: '', adjusterFileNumber: '',
            agencyInfo: { agentName: '', agentCellNumber: '', agentEmail: '', mortgageCompany: '' },
            policyInformation: { policyholderName: '', policyholderEmail: '', phoneNumberPrimary: '', phoneNumberSecondary: '', policyNumber: '', claimNumber: '', policyStartDate: '', policyEndDate: '' },
            insurerInfo: { insurer: '', edn: '', policyNumber: '', claimNumber: '', adjuster: '', fcn: '', adjustingFirm: '', fileNumber: '', insurerAddress: { street: '', city: '', state: '', zip: '' }, firmAddress: { street: '', city: '', state: '', zip: '' }, phoneNumber_1: '', phoneNumber_2: '', email: '', comments: '' },
            mailingAddress: { street: '', city: '', state: '', zip: '' },
            lossAddress: { street: '', city: '', state: '', zip: '' },
            sameAddress: false,
            claimInfo: { dateOfLoss: '', dateOfAssignment: '', dateOfContact: '', dateOfInspection: '' },
            coverages: { coverageABuilding: '0', deductibleABuilding: '0', coverageBPersonalProperty: '0', deductibleBPersonalProperty: '0', coverageOtherStructures: '0', deductibleOtherStructure: '0' },
            ratingInformation: { riskMethod: '', sfipPolicyType: '', numberOfUnits: '', priBuildingOccupancy: '', priBuildingType: '', primarySecondary: '', tenantIndicator: '', numberOfFloors: '', priFoundationType: '', priConstructionType: '', numberOfFloodOpenings: '', areaOfPermanentFlood: '', openings: '', engineeredOpenings: '', doesBuildingContainME: '', mELocatedAboveFirstFloor: '', buildingContainWasherDryerFreezer: '', washerDryerFreezerAboveFirstFloor: '', enclosureSize: '', firstFloorHeightInFeet: '', firstFloorHeightInches: '', firstFloorHeightMethod: '', postFirm: false, preFirm: false, floodZone: '', dateOfConstruction: '', dateOfLastSubstantialImprovement: '', firmDate: '', communityNumber: '', mapPanelNumber: '' }
        },
        userClaims: { claimNumber: '', fileNumber: '', policyholder: '', policyNumber: '', assignedDate: '', dateOfLoss: '', age: 0, status: 0 }
    };

    if (sourceJSON) {
        if (sourceJSON.assignmentId) {
            targetJSON.backOffice.policyInformation.claimNumber = sourceJSON.assignmentId;
            targetJSON.backOffice.insurerInfo.claimNumber = sourceJSON.assignmentId;
            targetJSON.userClaims.claimNumber = sourceJSON.assignmentId;
        }
        if (sourceJSON.dateOfLoss) {
            targetJSON.backOffice.claimInfo.dateOfLoss = formatDateString(sourceJSON.dateOfLoss);
            targetJSON.userClaims.dateOfLoss = formatDateString(sourceJSON.dateOfLoss);
        }
        if (sourceJSON.dateOfAssignment) {
            targetJSON.backOffice.claimInfo.dateOfAssignment = formatDateString(sourceJSON.dateOfAssignment);
            targetJSON.userClaims.assignedDate = formatDateString(sourceJSON.dateOfAssignment);
        }
        if (sourceJSON.floodPolicyinfo) {
            const policy = sourceJSON.floodPolicyinfo;
            if (policy.policyNumber) {
                targetJSON.backOffice.policyInformation.policyNumber = policy.policyNumber;
                targetJSON.backOffice.insurerInfo.policyNumber = policy.policyNumber;
                targetJSON.userClaims.policyNumber = policy.policyNumber;
            }
            if (policy.effectiveDate) targetJSON.backOffice.policyInformation.policyStartDate = formatDateString(policy.effectiveDate);
            if (policy.expirationDate) targetJSON.backOffice.policyInformation.policyEndDate = formatDateString(policy.expirationDate);
            if (policy.insured) {
                const insured = policy.insured;
                if (insured.primaryInsured) {
                    const fullName = [insured.primaryInsured.firstName, insured.primaryInsured.middleName, insured.primaryInsured.lastName].filter(n => n).join(' ');
                    targetJSON.backOffice.policyInformation.policyholderName = fullName;
                    targetJSON.userClaims.policyholder = fullName;
                }
                if (insured.homePhoneNumber) targetJSON.backOffice.policyInformation.phoneNumberPrimary = insured.homePhoneNumber;
                if (insured.cellPhoneNumber) targetJSON.backOffice.policyInformation.phoneNumberSecondary = insured.cellPhoneNumber;
                if (insured.emailAddress) targetJSON.backOffice.policyInformation.policyholderEmail = insured.emailAddress;
                if (insured.mailingAddress) {
                    targetJSON.backOffice.mailingAddress.street = insured.mailingAddress.addressLine1 || '';
                    targetJSON.backOffice.mailingAddress.city = insured.mailingAddress.city || '';
                    targetJSON.backOffice.mailingAddress.state = insured.mailingAddress.stateProvince || '';
                    targetJSON.backOffice.mailingAddress.zip = insured.mailingAddress.postalCode || '';
                }
                if (insured.PropertyAddress) {
                    targetJSON.backOffice.lossAddress.street = insured.PropertyAddress.addressLine1 || '';
                    targetJSON.backOffice.lossAddress.city = insured.PropertyAddress.city || '';
                    targetJSON.backOffice.lossAddress.state = insured.PropertyAddress.stateProvince || '';
                    targetJSON.backOffice.lossAddress.zip = insured.PropertyAddress.postalCode || '';
                }
            }
            if (policy.insuranceAgency) {
                targetJSON.backOffice.agencyInfo.agentName = policy.insuranceAgency.agencyName || '';
                targetJSON.backOffice.agencyInfo.agentCellNumber = policy.insuranceAgency.businessPhoneNumber || '';
                targetJSON.backOffice.agencyInfo.agentEmail = policy.insuranceAgency.emailAddress || '';
            }
            if (policy.coverages) {
                targetJSON.backOffice.coverages.coverageABuilding = policy.coverages.buildingCoverage?.toString() || '0';
                targetJSON.backOffice.coverages.deductibleABuilding = policy.coverages.buildingDeductible?.toString() || '0';
                targetJSON.backOffice.coverages.coverageBPersonalProperty = policy.coverages.contentsCoverage?.toString() || '0';
                targetJSON.backOffice.coverages.deductibleBPersonalProperty = policy.coverages.contentsDeductible?.toString() || '0';
                targetJSON.backOffice.coverages.coverageOtherStructures = policy.coverages.ICCCoverage?.toString() || '0';
                targetJSON.backOffice.coverages.deductibleOtherStructure = policy.coverages.IccDeductible?.toString() || '0';
            }
            targetJSON.backOffice.ratingInformation.sfipPolicyType = policy.SFIPPolicyType || '';
            targetJSON.backOffice.ratingInformation.priBuildingOccupancy = policy.BuildingoccupancyType || '';
            targetJSON.backOffice.ratingInformation.priBuildingType = policy.buildingType || '';
            targetJSON.backOffice.ratingInformation.priFoundationType = policy.FoundationType || '';
            targetJSON.backOffice.ratingInformation.priConstructionType = policy.ConstructionType || '';
            targetJSON.backOffice.ratingInformation.floodZone = policy.floodZone || '';
            targetJSON.backOffice.ratingInformation.numberOfFloors = policy.floors_in_building || '';
            if (policy.First_floor_height_ft !== undefined) targetJSON.backOffice.ratingInformation.firstFloorHeightInFeet = policy.First_floor_height_ft.toString();
            if (policy.First_floor_height_in !== undefined) targetJSON.backOffice.ratingInformation.firstFloorHeightInches = policy.First_floor_height_in.toString();
            if (policy.FIRM_Date) targetJSON.backOffice.ratingInformation.firmDate = formatDateString(policy.FIRM_Date);
            if (policy.dateOfConstruction) targetJSON.backOffice.ratingInformation.dateOfConstruction = formatDateString(policy.dateOfConstruction);
            if (policy.FIRM_status === 'Pre-FIRM') targetJSON.backOffice.ratingInformation.preFirm = true;
            else if (policy.FIRM_status === 'Post-FIRM') targetJSON.backOffice.ratingInformation.postFirm = true;
            if (policy.communityInformation) {
                targetJSON.backOffice.ratingInformation.communityNumber = policy.communityInformation.communityId || '';
                targetJSON.backOffice.ratingInformation.mapPanelNumber = (policy.communityInformation.panelNumber || '') + (policy.communityInformation.panelSuffix || '');
            }
        }
        if (sourceJSON.carrierWYOinfo) {
            targetJSON.backOffice.insurerInfo.insurer = sourceJSON.carrierWYOinfo.CompanyName || '';
            if (sourceJSON.carrierWYOinfo.mailingAddress) {
                targetJSON.backOffice.insurerInfo.insurerAddress.street = sourceJSON.carrierWYOinfo.mailingAddress.addressLine1 || '';
                targetJSON.backOffice.insurerInfo.insurerAddress.city = sourceJSON.carrierWYOinfo.mailingAddress.city || '';
                targetJSON.backOffice.insurerInfo.insurerAddress.state = sourceJSON.carrierWYOinfo.mailingAddress.stateProvince || '';
                targetJSON.backOffice.insurerInfo.insurerAddress.zip = sourceJSON.carrierWYOinfo.mailingAddress.postalCode || '';
            }
            targetJSON.backOffice.insurerInfo.phoneNumber_1 = sourceJSON.carrierWYOinfo.businessPhoneNumber || '';
        }
        if (sourceJSON.claimsAdjustingFirminfo) {
            targetJSON.backOffice.insurerInfo.adjustingFirm = sourceJSON.claimsAdjustingFirminfo.CompanyName || '';
            if (sourceJSON.claimsAdjustingFirminfo.mailingAddress) {
                targetJSON.backOffice.insurerInfo.firmAddress.street = sourceJSON.claimsAdjustingFirminfo.mailingAddress.addressLine1 || '';
                targetJSON.backOffice.insurerInfo.firmAddress.city = sourceJSON.claimsAdjustingFirminfo.mailingAddress.city || '';
                targetJSON.backOffice.insurerInfo.firmAddress.state = sourceJSON.claimsAdjustingFirminfo.mailingAddress.stateProvince || '';
                targetJSON.backOffice.insurerInfo.firmAddress.zip = sourceJSON.claimsAdjustingFirminfo.mailingAddress.postalCode || '';
            }
            targetJSON.backOffice.insurerInfo.phoneNumber_2 = sourceJSON.claimsAdjustingFirminfo.businessPhoneNumber || '';
        }
    }
    return targetJSON;
}

function formatDateString(dateStr) {
    if (!dateStr) return '';
    try {
        const date = new Date(dateStr);
        if (!isNaN(date.getTime())) {
            const month = (date.getMonth() + 1).toString().padStart(2, '0');
            const day = date.getDate().toString().padStart(2, '0');
            const year = date.getFullYear();
            return `${month}/${day}/${year}`;
        }
    } catch (e) { console.warn('Could not parse date:', dateStr); }
    return dateStr;
}
